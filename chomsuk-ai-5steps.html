<script>
  // ... (โค้ดส่วน Progress dots เหมือนเดิม) ...

  async function generateScript() {
    const product = document.getElementById('product-input').value.trim();
    if (!product) { alert('กรุณาใส่ชื่อสินค้าก่อนนะครับ'); return; }

    const output = document.getElementById('script-output');
    const scriptText = document.getElementById('script-text');
    const btn = document.querySelector('.gen-btn');

    // 🔑 อาจารย์อย่าลืมใส่ API KEY ของอาจารย์ตรงนี้เหมือนเดิมนะครับ
    const API_KEY = 'ใส่_API_KEY_ของอาจารย์ตรงนี้'; 
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
    
    btn.textContent = "⏳ Chomsuk.ai กำลังเสกเนื้อเพลงและสคริปต์...";
    output.classList.remove('visible');

    // 🚀 อัปเดต Prompt ใหม่ ให้สร้างเนื้อเพลงและสไตล์เพลงสำหรับ Suno โดยเฉพาะ
    const promptText = `คุณคือ Chomsuk.ai ผู้เชี่ยวชาญการสร้างคอนเทนต์ AI ครบวงจร
    สินค้า/บริการ: ${product}

    กรุณาสร้างข้อมูล 4 ส่วนดังนี้:
    1. 🎬 **บทพูดวิดีโอ (Clean Script)**: บทภาษาไทยล้วน สำหรับไปพากย์เสียง (ไม่มีวงเล็บ)
    2. 🖼 **คำสั่งสร้างรูป (Image Prompt)**: ภาษาอังกฤษ สำหรับสร้างรูปใน Bing/Leonardo
    3. 🎵 **เนื้อเพลง (Song Lyrics for Suno)**: แต่งเนื้อเพลงภาษาไทยที่มีท่อน [Verse] และ [Chorus] ให้เข้ากับสินค้า
    4. 🎸 **สไตล์เพลง (Music Style for Suno)**: คำสั่งภาษาอังกฤษสำหรับช่อง Style ใน Suno (เช่น Lo-fi Hip-hop, Thai Rock, etc.)

    ตอบแบบแยกหัวข้อชัดเจน ให้ลูกค้าก๊อปปี้ไปวางได้ทันที!`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
      });

      const data = await res.json();
      if(data.candidates) {
          // แสดงผลลัพธ์ในหน้าจอ
          scriptText.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
      } else {
          scriptText.textContent = 'เกิดข้อผิดพลาดจาก API ครับ';
      }
      output.classList.add('visible');
    } catch (err) {
      scriptText.textContent = 'การเชื่อมต่อผิดพลาดครับ';
      output.classList.add('visible');
    } finally {
      btn.textContent = "✨ สร้างสคริปต์ + เนื้อเพลงเลย";
    }
  }

  // ... (โค้ดส่วนฟังก์ชันคัดลอกเหมือนเดิม) ...
</script>
